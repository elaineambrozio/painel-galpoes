<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Painel de Gestão — Galpões</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--azul:#0033A0;--escuro:#071A57;--claro:#67BAE4;--ink:#1F2937;--mut:#7a879f;--bg:#EEF2F9}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Kanit,Calibri,Arial,sans-serif;background:linear-gradient(150deg,var(--escuro),var(--azul) 72%,#0a4ec4);min-height:100vh;color:var(--ink)}
body.in{background:var(--bg)}
/* ---------- login ---------- */
#gate{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.lcard{background:#fff;border-radius:24px;padding:44px 48px;max-width:560px;width:100%;box-shadow:0 30px 80px rgba(2,10,40,.45);text-align:center}
.logos{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:26px}
.logos img{height:52px;width:auto;object-fit:contain;flex:0 1 auto;max-width:44%}
.logos .sep{width:1px;height:40px;background:#e2e9f4;flex:none}
.lcard h2{color:var(--escuro);font-weight:600;font-size:1.2rem;letter-spacing:.2px}
.lcard p{color:#8a94a6;font-size:.82rem;font-weight:300;margin:4px 0 22px}
.lcard input{width:100%;padding:13px 16px;border:1.5px solid #dbe4f0;border-radius:12px;font-size:1rem;font-family:inherit;outline:none;text-align:center;letter-spacing:2px;transition:border .15s}
.lcard input:focus{border-color:var(--azul)}
.lcard button{width:100%;margin-top:12px;padding:13px;border:0;border-radius:12px;background:linear-gradient(120deg,var(--escuro),var(--azul));color:#fff;font-size:.98rem;font-weight:600;font-family:inherit;cursor:pointer;letter-spacing:.4px}
.lcard button:hover{filter:brightness(1.15)}
#err{color:#c0392b;font-size:.83rem;margin-top:12px;display:none}
/* ---------- app ---------- */
#app{max-width:1180px;margin:0 auto;padding:0 18px 26px}
.top{display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--escuro);margin:0 -18px 22px;padding:14px 28px;border-radius:0 0 20px 20px}
.brand{display:flex;align-items:center;gap:14px;min-width:0}
.mark{height:32px;width:auto;opacity:.95}
.brand h1{color:#fff;font-size:1.02rem;font-weight:600;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand span{color:#8fa7d9;font-size:.7rem;font-weight:300}
.sair{padding:8px 16px;border:1px solid rgba(255,255,255,.22);border-radius:10px;background:transparent;color:#cdd9f2;cursor:pointer;font-family:inherit;font-size:.82rem;white-space:nowrap}
.sair:hover{background:rgba(255,255,255,.08)}
.tabs{display:flex;gap:4px;background:#fff;padding:5px;border-radius:14px;width:max-content;max-width:100%;margin:0 auto 22px;box-shadow:0 4px 18px rgba(7,26,87,.08);flex-wrap:wrap;justify-content:center}
.tab{padding:9px 24px;border:0;border-radius:10px;background:transparent;color:#5b6b8c;font-family:inherit;font-size:.9rem;font-weight:500;cursor:pointer;transition:all .15s}
.tab:hover{color:var(--escuro)}
.tab.on{background:var(--escuro);color:#fff;font-weight:600}
.pane{display:none}.pane.on{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pagehead{text-align:center;margin:2px 0 20px}
.pagehead h2{color:var(--escuro);font-size:1.3rem;font-weight:600}
.pagehead p{color:var(--mut);font-size:.82rem;font-weight:300}
.note{background:#EAF3FF;border:1px solid #cfe3fb;border-radius:12px;padding:12px 16px;font-size:.83rem;color:#2b4a8f;margin-bottom:14px}
.hero{border-radius:20px;padding:30px 20px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 10px 30px rgba(7,26,87,.18)}
.hero img{height:60px;max-width:86%;width:auto;object-fit:contain}
.hero.eb{background:linear-gradient(120deg,#071A57 10%,#0033A0 80%)}
.hero.snv{background:linear-gradient(120deg,#0d1b3d 10%,#123a8f 80%)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px;margin-bottom:16px}
.card{background:#fff;border:1px solid #e6ecf6;border-radius:16px;padding:16px 18px;box-shadow:0 3px 12px rgba(7,26,87,.06)}
.card span{font-size:.7rem;color:#8a94a6;text-transform:uppercase;letter-spacing:.5px;font-weight:400}
.card b{display:block;font-size:1.45rem;color:var(--escuro);font-weight:600;margin-top:4px}
.card.kpi-r b{color:#c0392b}.card.kpi-y b{color:#b7791f}.card.kpi-b b{color:var(--azul)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.box{background:#fff;border:1px solid #e6ecf6;border-radius:16px;padding:20px;box-shadow:0 3px 12px rgba(7,26,87,.06);overflow-x:auto}
.box h3{color:var(--escuro);font-size:.98rem;font-weight:600;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:.84rem}
th{background:#F0F5FC;color:#41539a;text-align:left;padding:9px 10px;font-weight:600;font-size:.76rem;text-transform:uppercase;letter-spacing:.4px}
th:first-child{border-radius:8px 0 0 8px}th:last-child{border-radius:0 8px 8px 0}
td{padding:9px 10px;border-bottom:1px solid #eef2f9}
tr:last-child td{border-bottom:0}
small{color:#8a94a6}
.ch{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.74rem;font-weight:600;white-space:nowrap}
.ch.green{background:#e3f6e8;color:#1e7c3c}.ch.yellow{background:#fdf3d7;color:#9a7514}
.ch.orange{background:#fdeadb;color:#b35c12}.ch.red{background:#fde3e3;color:#c0392b}
.ch.black{background:#e5e7eb;color:#111827}.ch.gray{background:#f1f5f9;color:#64748b}
.chart{width:100%;height:auto}.ax{font-size:10px;fill:#8a94a6}
.cmes{text-align:center;width:44px}
.cell{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:7px;font-size:.78rem;font-weight:700}
.cell.P{background:#e3f6e8;color:#1e7c3c}.cell.L{background:#fdf3d7;color:#9a7514}
.cell.X{background:#fde3e3;color:#c0392b}.cell.N{background:#f1f5f9;color:#a9b4c6}
.mleg{font-size:.76rem;color:#7a879f;margin-bottom:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.leg{display:flex;gap:8px;align-items:center;font-size:.78rem;color:#4b5563;margin-top:8px}
.leg i{width:14px;height:14px;border-radius:4px;display:inline-block;margin-left:10px}
footer{text-align:center;color:#93a3c4;font-size:.74rem;font-weight:300;padding:22px 0 4px}
</style></head><body>

async function abrir(){

    const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2a(ENC.salt),iterations:ENC.iter,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
