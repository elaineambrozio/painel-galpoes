<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Painel de Gestão — Galpões</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--azul:#0033A0;--escuro:#071A57;--claro:#67BAE4;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Kanit,Calibri,Arial,sans-serif;background:linear-gradient(150deg,var(--escuro),var(--azul) 70%,#0a4ec4);min-height:100vh;color:#1F2937}
/* login */
#gate{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.lcard{background:#fff;border-radius:20px;padding:40px 44px;max-width:520px;width:100%;box-shadow:0 24px 70px rgba(0,0,0,.4);text-align:center}
.lcard img{max-width:100%;height:auto;max-height:86px;object-fit:contain;margin:8px 0}
.lcard h2{color:var(--escuro);font-weight:600;margin:14px 0 4px;font-size:1.25rem}
.lcard p{color:#6B7280;font-size:.85rem;margin-bottom:18px}
.lcard input{width:100%;padding:13px 16px;border:2px solid #dbe4f0;border-radius:10px;font-size:1rem;font-family:inherit;outline:none}
.lcard input:focus{border-color:var(--azul)}
.lcard button{width:100%;margin-top:12px;padding:13px;border:0;border-radius:10px;background:var(--azul);color:#fff;font-size:1rem;font-weight:600;font-family:inherit;cursor:pointer}
.lcard button:hover{background:var(--escuro)}
#err{color:#c0392b;font-size:.85rem;margin-top:10px;display:none}
.divisor{display:flex;align-items:center;gap:12px;color:#9aa7bd;font-size:.7rem;margin:6px 0}
.divisor:before,.divisor:after{content:"";flex:1;height:1px;background:#e3eaf5}
/* dash */
#app{max-width:1180px;margin:0 auto;padding:18px}
.top{display:flex;align-items:center;gap:22px;padding:16px 22px;background:var(--escuro);border-radius:16px;margin-bottom:14px;flex-wrap:wrap}
.top .hlogo{height:52px;object-fit:contain}
.ttl{flex:1;min-width:220px}.ttl h1{color:#fff;font-size:1.25rem;font-weight:600}.ttl span{color:#9db8e8;font-size:.78rem}
.tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:10px 20px;border:0;border-radius:10px;background:rgba(255,255,255,.15);color:#fff;font-family:inherit;font-size:.95rem;cursor:pointer}
.tab.on{background:#fff;color:var(--escuro);font-weight:600}
.sair{margin-left:auto;padding:10px 16px;border:0;border-radius:10px;background:rgba(255,255,255,.08);color:#cdd9f2;cursor:pointer;font-family:inherit}
.pane{display:none}.pane.on{display:block}
.brandrow{background:#fff;border-radius:14px;padding:12px;text-align:center;margin-bottom:14px}
.blogo{max-height:74px;max-width:90%;object-fit:contain}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:14px}
.card{background:#fff;border-radius:14px;padding:16px 18px;box-shadow:0 4px 18px rgba(7,26,87,.12)}
.card span{font-size:.74rem;color:#6B7280;text-transform:uppercase;letter-spacing:.4px}
.card b{display:block;font-size:1.5rem;color:var(--escuro);font-weight:600;margin-top:4px}
.card.kpi-r b{color:#c0392b}.card.kpi-y b{color:#b7791f}.card.kpi-b b{color:var(--azul)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.box{background:#fff;border-radius:14px;padding:18px;box-shadow:0 4px 18px rgba(7,26,87,.12);overflow-x:auto}
.box h3{color:var(--escuro);font-size:1rem;font-weight:600;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{background:var(--azul);color:#fff;text-align:left;padding:8px 10px;font-weight:500}
th:first-child{border-radius:8px 0 0 8px}th:last-child{border-radius:0 8px 8px 0}
td{padding:8px 10px;border-bottom:1px solid #eef2f9}
tr:nth-child(even) td{background:#F0F6FC}
small{color:#8a94a6}
.ch{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:600;white-space:nowrap}
.ch.green{background:#e3f6e8;color:#1e7c3c}.ch.yellow{background:#fdf3d7;color:#9a7514}
.ch.orange{background:#fdeadb;color:#b35c12}.ch.red{background:#fde3e3;color:#c0392b}
.ch.black{background:#e5e7eb;color:#111827}.ch.gray{background:#f1f5f9;color:#64748b}
.chart{width:100%;height:auto}.ax{font-size:10px;fill:#8a94a6}
.leg{display:flex;gap:8px;align-items:center;font-size:.78rem;color:#4b5563;margin-top:8px}
.leg i{width:14px;height:14px;border-radius:4px;display:inline-block;margin-left:10px}
footer{text-align:center;color:#b8c8ea;font-size:.75rem;padding:20px 0}
</style></head><body>

async function abrir(){
